<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walk Spike the Dog - Somach</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* The Article Viewport */
        #article-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: filter 0.5s ease;
        }

        /* The Lockout Overlay */
        #lockout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #00ff00;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            text-shadow: 0 0 5px #00ff00;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #lockout-overlay.unlocked {
            transform: translateY(-100%);
        }

        /* Demo Dashboard controller */
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            border: 1px dashed #00ff00;
            padding: 15px;
            font-size: 14px;
            background: rgba(5,5,5,0.9);
            color: #00ff00;
            z-index: 1000;
            text-shadow: 0 0 5px #00ff00;
        }

        .dog-container {
            font-size: 16px;
            line-height: 1.3;
            height: 120px;
            margin: 30px 0;
            white-space: pre-wrap;
            display: inline-block;
            text-align: left;
        }

        button {
            background: #050505;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-top: 10px;
        }

        h1, h2, h3 {
            margin: 10px 0;
            letter-spacing: 2px;
        }

        .dimmed {
            filter: blur(5px) grayscale(100%);
        }
    </style>
</head>
<body>

    <div id="panel">
        <strong>[METABOLIC CONTROL PANEL]</strong><br>
        Glucose: <span id="telemetry">98</span> mg/dL<br>
        State: <span id="status-text">STABLE</span><br>
        <button id="action-btn" onclick="toggleSpike()">Simulate Spike (184 mg/dL)</button>
    </div>

    <!-- The actual Somach Editorial Site -->
    <iframe id="article-frame" src="https://somach.vercel.app/editorial/jump.html"></iframe>

    <!-- The Metaphorical Lockout Overlay -->
    <div id="lockout-overlay" class="unlocked">
        <h1>!!! METABOLIC LOCKOUT !!!</h1>
        <h2>GLUCOSE SPIKE DETECTED (184 mg/dL)</h2>
        <hr style="border: 0; border-top: 1px solid #00ff00; width: 80%; max-width: 500px; margin: 20px 0;">
        <p>Your attention system is compromised. Pacing required to restore focus.</p>
        
        <pre class="dog-container" id="dog-ascii"></pre>

        <h3 id="step-counter">Steps remaining: 50</h3>
        <p style="font-size: 12px; opacity: 0.8;">[Tap Spacebar to walk Spike and clear your screen]</p>
    </div>

    <script>
        let steps = 50;
        let isSpiked = false;
        let frameIndex = 0;
        let animInterval = null;
        const telemetryEl = document.getElementById('telemetry');
        const statusEl = document.getElementById('status-text');
        const overlayEl = document.getElementById('lockout-overlay');
        const frameEl = document.getElementById('article-frame');
        const actionBtn = document.getElementById('action-btn');

        const frames = [
`   __    __
  /  \\__/  \\____
  \\            /___
   / /-------\\ \\
  /_/         /_/`,

`   __    __
  /  \\__/  \\____
  \\            /___
    | |-------\\ |
   /_/         /_/`,

`   __    __
  /  \\__/  \\____
  \\            /___
   \\ \\-------\\ \\
   /_/         /_/`
        ];

        function animateDog() {
            document.getElementById('dog-ascii').textContent = frames[frameIndex];
            frameIndex = (frameIndex + 1) % frames.length;
        }

        function toggleSpike() {
            if (!isSpiked) {
                triggerSpike();
            } else {
                resolveSpike();
            }
        }

        function triggerSpike() {
            isSpiked = true;
            overlayEl.classList.remove('unlocked');
            frameEl.classList.add('dimmed');
            telemetryEl.innerText = '184';
            statusEl.innerText = 'CRITICAL SPIKE';
            actionBtn.innerText = 'Abrupt Reset';
            steps = 50;
            updateSteps();

            if (animInterval) clearInterval(animInterval);
            frameIndex = 0;
            animateDog();
            animInterval = setInterval(animateDog, 200);
        }

        function updateSteps() {
            document.getElementById('step-counter').innerText = `Steps remaining: ${steps}`;
            if (steps <= 0) {
                resolveSpike();
            }
        }

        function resolveSpike() {
            isSpiked = false;
            if (animInterval) {
                clearInterval(animInterval);
                animInterval = null;
            }
            overlayEl.classList.add('unlocked');
            frameEl.classList.remove('dimmed');
            telemetryEl.innerText = '98';
            statusEl.innerText = 'STABLE';
            actionBtn.innerText = 'Simulate Spike (184 mg/dL)';
        }

        window.addEventListener('keydown', (e) => {
            if (isSpiked && e.code === 'Space') {
                e.preventDefault();
                steps--;
                updateSteps();
            }
        });
    </script>
</body>
</html>
