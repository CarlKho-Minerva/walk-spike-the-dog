<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walk Spike the Dog - Somach</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0d0d0d;
            color: #f2f2f2;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        /* The Article Viewport */
        #article-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: filter 0.5s ease;
        }

        /* Clean Monochrome Lockout Overlay */
        #lockout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d;
            color: #f2f2f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #lockout-overlay.unlocked {
            transform: translateY(-100%);
        }

        /* Minimalist Dashboard Controller */
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            border: 1px solid #444;
            padding: 15px;
            font-size: 13px;
            background: rgba(13, 13, 13, 0.95);
            color: #fff;
            z-index: 1000;
        }

        .dog-container {
            font-size: 15px;
            line-height: 1.2;
            height: 130px;
            margin: 25px 0;
            white-space: pre;
            display: inline-block;
            text-align: left;
            color: #fff;
        }

        button {
            background: #0d0d0d;
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            margin-top: 10px;
            transition: background 0.3s, color 0.3s;
        }

        button:hover {
            background: #fff;
            color: #0d0d0d;
        }

        h1, h2, h3 {
            margin: 10px 0;
            font-weight: normal;
            letter-spacing: 1px;
        }

        .dimmed {
            filter: blur(10px) grayscale(100%);
        }

        #motion-btn {
            background: #222;
            border-color: #555;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="panel">
        <strong>[METABOLIC STATUS]</strong><br>
        Glucose Level: <span id="telemetry">98</span> mg/dL<br>
        Baseline State: <span id="status-text">STABLE</span><br>
        <button id="action-btn" onclick="toggleSpike()">Simulate Spike (184 mg/dL)</button>
    </div>

    <!-- The actual Somach Editorial Site -->
    <iframe id="article-frame" src="https://somach.vercel.app/editorial/jump.html"></iframe>

    <!-- The Metaphorical Lockout Overlay -->
    <div id="lockout-overlay" class="unlocked">
        <h1>[ METABOLIC SHIFT DETECTED ]</h1>
        <p style="color: #888;">Spike's current reading is 184 mg/dL. Code access suspended.</p>
        <hr style="border: 0; border-top: 1px solid #333; width: 60%; max-width: 400px; margin: 20px 0;">
        
        <button id="motion-btn" onclick="requestMotionPermission()">Enable Motion Sensor</button>
        
        <div>
            <pre class="dog-container" id="dog-ascii"></pre>
        </div>

        <h3 id="step-counter">Required Pacing Steps: 50</h3>
        <p style="font-size: 12px; color: #666; margin-top: 15px;">[Shake phone or tap Spacebar to simulate muscle glucose uptake]</p>
    </div>

    <script>
        let steps = 50;
        let isSpiked = false;
        let frameIndex = 0;
        let animInterval = null;
        let lastMotionTime = 0;

        const telemetryEl = document.getElementById('telemetry');
        const statusEl = document.getElementById('status-text');
        const overlayEl = document.getElementById('lockout-overlay');
        const frameEl = document.getElementById('article-frame');
        const actionBtn = document.getElementById('action-btn');
        const motionBtn = document.getElementById('motion-btn');

        // Detailed 8-frame fluid walking dog cycle
        const frames = [
`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
\\  / \\ / \\  /
 \\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
|  | | | |  |
\\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
/  / / / /  /
\\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
|  | | | |  |
 \\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
\\  \\ \\ \\ \\  \\
 \\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
 |  | | |  |
 \\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
 \\  \\ \\ \\  \\
  \\_]  \\_]  \\_]`,

`  / \\__
 (    @\\___
 /         \\
/   _   _   \\
  |  | |  |
  \\_]  \\_]  \\_]`
        ];

        function animateDog() {
            document.getElementById('dog-ascii').textContent = frames[frameIndex];
            frameIndex = (frameIndex + 1) % frames.length;
        }

        function toggleSpike() {
            if (!isSpiked) {
                triggerSpike();
            } else {
                resolveSpike();
            }
        }

        function triggerSpike() {
            isSpiked = true;
            overlayEl.classList.remove('unlocked');
            frameEl.classList.add('dimmed');
            telemetryEl.innerText = '184';
            statusEl.innerText = 'HYPERGLYCEMIA';
            actionBtn.innerText = 'Force Reset';
            steps = 50;
            updateSteps();

            if (animInterval) clearInterval(animInterval);
            frameIndex = 0;
            animateDog();
            animInterval = setInterval(animateDog, 140); // Faster frame rate for 8-frame loop
        }

        function updateSteps() {
            document.getElementById('step-counter').innerText = `Required Pacing Steps: ${steps}`;
            if (steps <= 0) {
                resolveSpike();
            }
        }

        function resolveSpike() {
            isSpiked = false;
            if (animInterval) {
                clearInterval(animInterval);
                animInterval = null;
            }
            overlayEl.classList.add('unlocked');
            frameEl.classList.remove('dimmed');
            telemetryEl.innerText = '98';
            statusEl.innerText = 'STABLE';
            actionBtn.innerText = 'Simulate Spike (184 mg/dL)';
        }

        // Motion detection logic for real pacing
        function handleMotion(event) {
            if (!isSpiked) return;
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            const now = Date.now();
            if (now - lastMotionTime > 250) { // Limit to maximum 4 steps per second
                const movementMagnitude = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
                if (movementMagnitude > 15) { // Threshold for gait movement
                    steps--;
                    updateSteps();
                    lastMotionTime = now;
                }
            }
        }

        function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            motionBtn.style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                motionBtn.style.display = 'none';
            }
        }

        // Fallback spacebar pacing trigger
        window.addEventListener('keydown', (e) => {
            if (isSpiked && e.code === 'Space') {
                e.preventDefault();
                steps--;
                updateSteps();
            }
        });
    </script>
</body>
</html>
