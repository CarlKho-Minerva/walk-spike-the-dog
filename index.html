<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Walk Spike the Dog - Somach</title>
    <!-- Google Fonts for Retro-Pixel Aesthetics -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=VT323&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #0d0d0d;
            color: #f2f2f2;
            font-family: 'VT323', monospace;
            overflow: hidden;
            font-size: 21px;
        }

        /* The Article Viewport */
        #article-frame {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
            transition: filter 0.5s ease;
        }

        /* Clean Monochrome Lockout Overlay */
        #lockout-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0d0d0d;
            color: #f2f2f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        #lockout-overlay.unlocked {
            transform: translateY(-100%);
        }

        /* Minimalist Dashboard Controller */
        #panel {
            position: absolute;
            top: 20px;
            left: 20px;
            border: 2px solid #f2f2f2;
            padding: 15px;
            background: #0d0d0d;
            color: #fff;
            z-index: 1000;
        }

        /* Container for PNG frames */
        .dog-image-container {
            height: 140px;
            margin: 25px 0;
            display: inline-block;
            overflow: hidden;
        }

        #dog-img {
            height: 100%;
            /* Inverts colors, blends the off-black background, and crops out top numbers */
            filter: invert(1) contrast(1.2);
            mix-blend-mode: lighten;
            clip-path: inset(15% 0 0 0); /* Deeper crop to remove artifact */
            image-rendering: pixelated;
        }

        button {
            background: #0d0d0d;
            color: #fff;
            border: 2px solid #fff;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Silkscreen', monospace;
            font-size: 11px;
            margin-top: 10px;
            transition: background 0.3s, color 0.3s;
        }

        button:hover {
            background: #fff;
            color: #0d0d0d;
        }

        h1, h2, h3 {
            margin: 10px 0;
            font-family: 'Silkscreen', monospace;
            font-weight: normal;
            letter-spacing: 1px;
        }

        h1 {
            font-size: 28px;
        }

        h2 {
            font-size: 18px;
        }

        h3 {
            font-size: 20px;
        }

        .dimmed {
            filter: blur(10px) grayscale(100%);
        }

        #motion-btn {
            background: #222;
            border-color: #555;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="panel">
        <strong>[METABOLIC STATUS]</strong><br>
        Glucose Level: <span id="telemetry">98</span> mg/dL<br>
        Baseline State: <span id="status-text">STABLE</span><br>
        <button id="action-btn" onclick="toggleSpike()">Simulate Spike</button>
    </div>

    <!-- The actual Somach Editorial Site -->
    <iframe id="article-frame" src="https://somach.vercel.app/editorial/jump.html"></iframe>

    <!-- The Metaphorical Lockout Overlay -->
    <div id="lockout-overlay" class="unlocked">
        <h1>[ METABOLIC SHIFT DETECTED ]</h1>
        <p style="color: #888; font-size: 24px;">Spike's current reading is 184 mg/dL. Code access suspended.</p>
        <hr style="border: 0; border-top: 2px solid #333; width: 60%; max-width: 400px; margin: 20px 0;">
        
        <button id="motion-btn" onclick="requestMotionPermission()">Enable Motion Sensor</button>
        
        <div class="dog-image-container">
            <img id="dog-img" src="ezgif-split/tile000.png" alt="Spike Walking">
        </div>

        <h3 id="step-counter">Required Pacing Steps: 50</h3>
        <p style="font-size: 18px; color: #666; margin-top: 15px;">[Shake phone or tap Spacebar to simulate muscle glucose uptake]</p>
    </div>

    <script>
        let steps = 50;
        let isSpiked = false;
        let frameIndex = 0;
        let animInterval = null;
        let lastMotionTime = 0;

        const telemetryEl = document.getElementById('telemetry');
        const statusEl = document.getElementById('status-text');
        const overlayEl = document.getElementById('lockout-overlay');
        const frameEl = document.getElementById('article-frame');
        const actionBtn = document.getElementById('action-btn');
        const motionBtn = document.getElementById('motion-btn');
        const dogImgEl = document.getElementById('dog-img');

        // PNG frame sequence from ezgif-split
        const frames = [
            'ezgif-split/tile000.png',
            'ezgif-split/tile001.png',
            'ezgif-split/tile002.png',
            'ezgif-split/tile004.png',
            'ezgif-split/tile005.png',
            'ezgif-split/tile006.png',
            'ezgif-split/tile008.png',
            'ezgif-split/tile009.png'
        ];

        // Preload frames to prevent flickering during animation
        const preloadedImages = [];
        frames.forEach((src) => {
            const img = new Image();
            img.src = src;
            preloadedImages.push(img);
        });

        function animateDog() {
            dogImgEl.src = frames[frameIndex];
            frameIndex = (frameIndex + 1) % frames.length;
        }

        function toggleSpike() {
            if (!isSpiked) {
                triggerSpike();
            } else {
                resolveSpike();
            }
        }

        function triggerSpike() {
            isSpiked = true;
            overlayEl.classList.remove('unlocked');
            frameEl.classList.add('dimmed');
            telemetryEl.innerText = '184';
            statusEl.innerText = 'HYPERGLYCEMIA';
            actionBtn.innerText = 'Force Reset';
            steps = 50;
            updateSteps();

            if (animInterval) clearInterval(animInterval);
            frameIndex = 0;
            animateDog();
            animInterval = setInterval(animateDog, 120); // Steady gait timing
        }

        function updateSteps() {
            document.getElementById('step-counter').innerText = `Required Pacing Steps: ${steps}`;
            if (steps <= 0) {
                resolveSpike();
            }
        }

        function resolveSpike() {
            isSpiked = false;
            if (animInterval) {
                clearInterval(animInterval);
                animInterval = null;
            }
            overlayEl.classList.add('unlocked');
            frameEl.classList.remove('dimmed');
            telemetryEl.innerText = '98';
            statusEl.innerText = 'STABLE';
            actionBtn.innerText = 'Simulate Spike';
        }

        // Motion detection logic for real pacing
        function handleMotion(event) {
            if (!isSpiked) return;
            const acc = event.accelerationIncludingGravity;
            if (!acc) return;

            const now = Date.now();
            if (now - lastMotionTime > 250) { // Limit step count frequency
                const movementMagnitude = Math.sqrt(acc.x * acc.x + acc.y * acc.y + acc.z * acc.z);
                if (movementMagnitude > 15) { // Threshold for gait movement
                    steps--;
                    updateSteps();
                    lastMotionTime = now;
                }
            }
        }

        function requestMotionPermission() {
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            window.addEventListener('devicemotion', handleMotion);
                            motionBtn.style.display = 'none';
                        }
                    })
                    .catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                motionBtn.style.display = 'none';
            }
        }

        // Fallback spacebar pacing trigger
        window.addEventListener('keydown', (e) => {
            if (isSpiked && e.code === 'Space') {
                e.preventDefault();
                steps--;
                updateSteps();
            }
        });
    </script>
</body>
</html>
